[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers for opt-in suites. Default `pytest` run excludes both via the
# `addopts` filter below; CLI `-m smoke` / `-m speed` overrides it.
markers =
    smoke: tests that hit live external services (slow, network-dependent)
    speed: latency / performance tests with hard thresholds (run sequentially)

addopts = -m "not smoke and not speed"
