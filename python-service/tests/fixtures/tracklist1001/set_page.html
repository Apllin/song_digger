<!--
  Captured 2026-05-03 (synthetic DJ set page).
  Selectors under test:
    - `div.tlpTog` for each track row
    - `a[href^="/track/"]` for the track link inside each row
    - `meta[itemprop="byArtist"]` and `meta[itemprop="name"]` for metadata

  Layout: 5 tracks, seed (12345) at index 2. With WINDOW=2 the adapter
  should pick up tids 91, 92, 94, 95 (everything except the seed itself
  in the 0..4 window). Includes one row missing meta tags to verify the
  parser drops malformed rows without raising.
-->
<html><body>
<div class="tracklistContainer">

  <div class="tlpTog">
    <a href="/track/91-pre-track-one">link</a>
    <meta itemprop="byArtist" content="Reeko">
    <meta itemprop="name" content="Faceless">
  </div>

  <div class="tlpTog">
    <a href="/track/92-pre-track-two">link</a>
    <meta itemprop="byArtist" content="Exium">
    <meta itemprop="name" content="Conundrum">
  </div>

  <div class="tlpTog">
    <a href="/track/12345-oscar-mulero-horses">link</a>
    <meta itemprop="byArtist" content="Oscar Mulero">
    <meta itemprop="name" content="Horses">
  </div>

  <div class="tlpTog">
    <a href="/track/94-post-track-one">link</a>
    <meta itemprop="byArtist" content="Architectural">
    <meta itemprop="name" content="Glass Wall">
  </div>

  <div class="tlpTog">
    <a href="/track/95-post-track-two">link</a>
    <meta itemprop="byArtist" content="Linear System">
    <meta itemprop="name" content="Static">
  </div>

  <!-- Malformed row: link present but meta missing. Parser must skip. -->
  <div class="tlpTog">
    <a href="/track/96-malformed">link</a>
  </div>

</div>
</body></html>
